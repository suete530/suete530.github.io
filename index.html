<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BSIS-1 · Fines Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #9acd32; min-height: 100vh;
            font-family: 'Segoe UI', 'SF Pro Text', 'Courier New', monospace, system-ui;
            padding: 20px; transition: background 0.3s, color 0.3s;
        }
        body.dark { background: #1a1a2e; color: #e0e0e0; }
        .header-bar {
            background: #2d3e5f; color: white; padding: 15px 20px;
            margin: -20px -20px 20px -20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        body.dark .header-bar { background: #16213e; }
        .header-bar h1 { font-size: 1.2rem; }
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        .logout-btn {
            background: #dc3545; color: white; padding: 8px 16px;
            border-radius: 20px; text-decoration: none; font-size: 0.8rem;
            cursor: pointer; border: none;
        }
        .dark-toggle {
            background: #555; color: white; padding: 8px 14px;
            border-radius: 20px; font-size: 1rem; cursor: pointer; border: none;
        }
        .admin-btn {
            background: #6f42c1; color: white; padding: 8px 14px;
            border-radius: 20px; font-size: 0.75rem; cursor: pointer; border: none;
        }
        .viewer-badge {
            background: #ffc107; color: #333; padding: 6px 14px;
            border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }
        .admin-badge {
            background: #28a745; color: white; padding: 6px 14px;
            border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }
        .notebook-container {
            max-width: 750px; margin: 0 auto; background: #fffef7;
            border-radius: 32px; padding: 20px 24px 35px;
            border: 1px solid #e9e2b3; transition: background 0.3s, border-color 0.3s;
        }
        body.dark .notebook-container { background: #16213e; border-color: #0f3460; }
        h2 {
            font-family: 'Courier New', monospace; font-weight: 800; font-size: 1.8rem;
            text-align: center; border-bottom: 3px dashed #ffb347; display: inline-block;
            margin: 0 auto 12px; padding-bottom: 6px;
            background: linear-gradient(135deg, #1e2f5e 0%, #2c3e6d 100%);
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        body.dark h2 {

        body.dark .date-badge { background: #0f3460; color: #e0e0e0; border-color: #1a4a7a; }

        body.dark .section-selector label { color: #2dd573; }
        .section-selector select {

            background: white; font-family: monospace; font-weight: 600;
        }
        body.dark .section-selector select {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        .btn-add-section {
            background: #28a745; color: white; border: none; padding: 8px 15px;
            border-radius: 30px; font-weight: bold; font-size: 0.8rem; cursor: pointer;
        }
        .stats-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px; padding: 18px 20px; margin: 10px 0 18px;
            color: white; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px;
        }
        .stat-card {
            background: rgba(255,255,255,0.15); border-radius: 15px; padding: 12px; text-align: center;
        }
        .stat-card .stat-label { font-size: 0.7rem; opacity: 0.9; }
        .stat-card .stat-value { font-size: 1.2rem; font-weight: 800; }
        .input-panel {
            background: #f5f0df; border-radius: 28px; padding: 18px 20px;
            margin: 10px 0 20px; border-left: 8px solid #ffaa44;
        }
        body.dark .input-panel { background: #1e293b; border-left-color: #f59e0b; }
        .input-group {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 15px;
        }
        .field { flex: 1; min-width: 120px; }
        .field label {
            display: block; font-size: 0.7rem; font-weight: bold;
            text-transform: uppercase; color: #7b6236; margin-bottom: 4px;
        }
        body.dark .field label { color: #a78bfa; }
        .field input, .field select {
            width: 100%; padding: 10px 12px; border-radius: 60px;
            border: 1px solid #e2cf9a; background: white;
            font-family: monospace; font-size: 0.9rem;
        }
        body.dark .field input, body.dark .field select {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        button {
            background: #ffaa44; border: none; padding: 10px 18px;
            border-radius: 60px; font-weight: bold; font-family: monospace;
            font-size: 0.9rem; cursor: pointer;
        }
        .btn-clear { background: #c0b07a; }
        .action-buttons { display: flex; gap: 12px; }
        .search-filter-bar {
            background: #e8f0f8; border-radius: 20px; padding: 12px 18px;
            margin: 10px 0 15px; border-left: 8px solid #4682b4;
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        body.dark .search-filter-bar { background: #1e293b; border-left-color: #60a5fa; }
        .search-filter-bar input {
            flex: 1; min-width: 120px; padding: 8px 14px;
            border-radius: 30px; border: 1px solid #b8c8d8;
        }
        body.dark .search-filter-bar input {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        .search-filter-bar select {
            padding: 8px 12px; border-radius: 30px; border: 1px solid #b8c8d8;
        }
        body.dark .search-filter-bar select {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        .fines-list-section {

            margin: 15px 0 18px; border-left: 8px solid #ffaa44;

        body.dark .fines-list-section { background: #1e293b; border-left-color: #f59e0b; }
        .list-header {
            font-size: 1.3rem; font-weight: bold; color: #bf5e00;

            flex-wrap: wrap; gap: 12px; margin-bottom: 18px;

            flex-wrap: wrap; gap: 8px;
        }
        body.dark .student-entry { border-bottom-color: #2d3748; }
        .student-name { font-weight: 800; }
        .gender-badge {
            font-size: 0.7rem; background: #d9d0a5; padding: 2px 12px; border-radius: 30px;
        }
        body.dark .gender-badge { background: #374151; }
        .fine-amount {

        }
        .status-unpaid {
            background: #dc3545; color: white; padding: 2px 10px;
            border-radius: 20px; font-size: 0.7rem;
        }
        .entry-actions { display: flex; gap: 8px; }

        .login-overlay {

        }
        body.dark .login-box { background: #16213e; color: #e0e0e0; }
        .login-box h2 {
            font-size: 1.5rem; margin-bottom: 8px;
            background: linear-gradient(135deg, #6f42c1, #17a2b8);
            background-clip: text; -webkit-background-clip: text; color: transparent;

        }
        .login-box p { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
        .login-input {

            text-align: center; letter-spacing: 4px; margin-bottom: 16px;

        body.dark .login-input {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        .login-btn {
            width: 100%; padding: 14px; border-radius: 16px;
            background: linear-gradient(135deg, #6f42c1, #764ba2);
            color: white; font-size: 1rem; font-weight: bold; border: none; cursor: pointer;
        }
        .login-error { color: #dc3545; font-size: 0.8rem; margin-top: 12px; display: none; }
        .login-viewer-btn {
            background: none; border: none; color: #4682b4; font-size: 0.8rem;
            margin-top: 16px; cursor: pointer; text-decoration: underline;
        }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fffef7; border-radius: 24px; padding: 24px;
            max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        body.dark .modal { background: #16213e; color: #e0e0e0; }
        .modal h3 { font-size: 1.2rem; margin-bottom: 16px; color: #2d3e5f; }
        body.dark .modal h3 { color: #82aaff; }
        .modal-close {
            float: right; background: #dc3545; color: white; border: none;
            border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
            font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .payment-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
        .payment-form label {
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #7b6236;
        }
        body.dark .payment-form label { color: #a78bfa; }
        .payment-form input {
            padding: 10px; border-radius: 12px; border: 1px solid #e2cf9a;
            font-family: monospace; font-size: 0.9rem;
        }
        body.dark .payment-form input {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        .payment-history-list { max-height: 250px; overflow-y: auto; }
        .payment-history-entry {
            padding: 10px; border-bottom: 1px dashed #eedbae;
            display: flex; justify-content: space-between; align-items: center;
        }
        body.dark .payment-history-entry { border-bottom-color: #2d3748; }
        .payment-date { font-size: 0.7rem; color: #888; }
        .payment-amount { font-weight: bold; color: #28a745; }
        .payment-type {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
            background: #d4edda; color: #155724;
        }
        body.dark .payment-type { background: #1e3a2f; color: #2dd573; }
        .payment-type.partial { background: #fff3cd; color: #856404; }
        body.dark .payment-type.partial { background: #3b3520; color: #f59e0b; }
        .btn-delete-payment {
            background: transparent; color: #dc3545; border: none;
            padding: 2px 6px; font-size: 0.7rem; cursor: pointer; border-radius: 10px;
        }
        .pw-form { display: flex; flex-direction: column; gap: 12px; }
        .pw-form label {
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #7b6236;
        }
        body.dark .pw-form label { color: #a78bfa; }
        .pw-form input {
            padding: 10px; border-radius: 12px; border: 1px solid #e2cf9a;
            font-family: monospace; font-size: 0.9rem;
        }
        body.dark .pw-form input {
            background: #0f3460; color: #e0e0e0; border-color: #1a4a7a;
        }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: inherit !important; }
        body.is-admin .admin-flex { display: flex !important; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .student-entry { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 Fines Manager</h2>
            <p>Enter admin password or continue as viewer</p>
            <input type="password" class="login-input" id="loginPassword" placeholder="••••••••" maxlength="30">
            <button class="login-btn" id="loginBtn">🔓 Admin Login</button>
            <div class="login-error" id="loginError">❌ Wrong password!</div>
            <button class="login-viewer-btn" id="viewAsGuest">👁️ Continue as Viewer (Read Only)</button>
        </div>
    </div>

    <div class="header-bar">
        <h1>📋 BSIS Fines Manager</h1>
        <div class="header-buttons">
            <span id="roleBadge" class="viewer-badge">👁️ Viewer</span>
            <button class="dark-toggle" id="darkToggle">🌙</button>
            <button class="admin-btn admin-only" id="changePwBtn">🔑 Password</button>
            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        </div>
    </div>

    <div class="notebook-container">
        <div class="title-wrapper">
            <h2>STUDENT FINES</h2>
            <div class="date-badge" id="date"></div>
        </div>

        <div class="section-selector admin-only">
            <label>📚 Section:</label>
            <select id="sectionSelect"></select>
            <button class="btn-add-section" id="addSectionBtn">➕ New Section</button>
        </div>
        <div class="section-selector" style="justify-content:center;">
            <label>📚 Section:</label>
            <select id="sectionSelectView"></select>
        </div>

        <div class="stats-panel" id="statsPanel">
            <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value" id="statTotalStudents">0</div></div>
            <div class="stat-card"><div class="stat-label">Total Fines</div><div class="stat-value" id="statTotalFines">₱0</div></div>
            <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value" id="statAvgFine">₱0</div></div>
            <div class="stat-card"><div class="stat-label">Highest</div><div class="stat-value" id="statHighestFine">₱0</div></div>
            <div class="stat-card"><div class="stat-label">Paid/Unpaid</div><div class="stat-value" id="statPaidUnpaid">0/0</div></div>
            <div class="stat-card"><div class="stat-label">Collected</div><div class="stat-value" id="statCollected">₱0</div></div>
        </div>

        <div class="input-panel admin-only">
            <div class="input-group">
                <div class="field"><label>👤 Full Name</label><input type="text" id="studentName" placeholder="e.g., Maria Santos"></div>
                <div class="field"><label>⚥ Gender</label><select id="studentGender"><option value="male">♂ Male</option><option value="female">♀ Female</option><option value="non-binary">⚧ Non-binary</option></select></div>
                <div class="field"><label>💰 Fine (₱)</label><input type="number" id="studentFine" placeholder="0.00" step="0.01" value="0"></div>
                <div class="field"><label>📊 Status</label><select id="studentStatus"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
                <div class="action-buttons"><button id="addBtn">➕ ADD</button><button id="clearFormBtn" class="btn-clear">🗑️ Clear</button></div>
            </div>
        </div>

        <div class="search-filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search...">
            <select id="filterGender"><option value="all">All Genders</option><option value="male">Male</option><option value="female">Female</option></select>
            <select id="filterStatus"><option value="all">All Status</option><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select>
            <select id="sortBy"><option value="name">Name</option><option value="fine-high">Fine ↓</option><option value="fine-low">Fine ↑</option></select>
        </div>

        <div class="fines-list-section">
            <div class="list-header">
                <span>📌 FINES LEDGER</span>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn-payment" id="exportPaymentsBtn">📥 Payments CSV</button>
                    <button class="btn-export" id="exportCsvBtn">📥 Fines CSV</button>
                </div>
            </div>
            <div class="student-list" id="studentListContainer"><div class="loading-msg">Loading...</div></div>
            <div class="total-fines"><span>💰 TOTAL</span><span id="totalAmount">₱ 0.00</span></div>
        </div>
    </div>

    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <button class="modal-close" onclick="closePaymentModal()">✕</button>
            <h3 id="paymentModalTitle">💳 Payment History</h3>
            <div class="payment-form admin-only" id="paymentForm">
                <label>Payment Amount (₱)</label><input type="number" id="paymentAmount" step="0.01" placeholder="0.00">
                <label>Date</label><input type="date" id="paymentDate">
                <label>Note (optional)</label><input type="text" id="paymentNote" placeholder="e.g., Partial payment">
                <button id="submitPaymentBtn">✅ Add Payment</button>
            </div>
            <div class="payment-history-list" id="paymentHistoryList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="changePwModal">
        <div class="modal">
            <button class="modal-close" onclick="closeChangePwModal()">✕</button>
            <h3>🔑 Change Password</h3>
            <div class="pw-form">
                <label>Current Password</label><input type="password" id="currentPw" placeholder="••••••••">
                <label>New Password</label><input type="password" id="newPw" placeholder="••••••••">
                <label>Confirm New Password</label><input type="password" id="confirmPw" placeholder="••••••••">
                <button id="savePwBtn">💾 Save Password</button>
            </div>
        </div>
    </div>

        const loginOverlay = document.getElementById('loginOverlay');

        const viewAsGuest = document.getElementById('viewAsGuest');
        const roleBadge = document.getElementById('roleBadge');

        const changePwBtn = document.getElementById('changePwBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const changePwModal = document.getElementById('changePwModal');

        const sortBySelect = document.getElementById('sortBy');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const exportPaymentsBtn = document.getElementById('exportPaymentsBtn');
        const paymentModal = document.getElementById('paymentModal');
        const paymentAmount = document.getElementById('paymentAmount');
        const paymentDate = document.getElementById('paymentDate');
        const paymentNote = document.getElementById('paymentNote');
        const submitPaymentBtn = document.getElementById('submitPaymentBtn');
        const paymentHistoryList = document.getElementById('paymentHistoryList');
        const paymentModalTitle = document.getElementById('paymentModalTitle');

        document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
        });

        function getAdminPassword() {
            return localStorage.getItem('fm_admin_pw') || 'admin123';
        }

        loginBtn.addEventListener('click', doLogin);
        loginPassword.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
        viewAsGuest.addEventListener('click', enterViewer);

        function doLogin() {
            const pw = loginPassword.value;
            if (pw === getAdminPassword()) {
                isAdmin = true;
                document.body.classList.add('is-admin');
                loginOverlay.classList.add('hidden');
                roleBadge.className = 'admin-badge';
                roleBadge.textContent = '👑 Admin';
                initApp();
            } else {
                loginError.style.display = 'block';
                loginPassword.value = '';
            }
        }

        function enterViewer() {
            isAdmin = false;
            document.body.classList.remove('is-admin');
            loginOverlay.classList.add('hidden');
            roleBadge.className = 'viewer-badge';
            roleBadge.textContent = '👁️ Viewer';
            initApp();
        }

        logoutBtn.addEventListener('click', () => {
            isAdmin = false;
            document.body.classList.remove('is-admin');
            if (unsubscribeSections) unsubscribeSections();
            if (unsubscribeStudents) unsubscribeStudents();
            loginOverlay.classList.remove('hidden');
            loginPassword.value = '';
            loginError.style.display = 'none';
            roleBadge.className = 'viewer-badge';
            roleBadge.textContent = '👁️ Viewer';
        });

        changePwBtn.addEventListener('click', () => {
            changePwModal.classList.add('active');
            currentPw.value = ''; newPw.value = ''; confirmPw.value = '';
        });

        function closeChangePwModal() { changePwModal.classList.remove('active'); }

        savePwBtn.addEventListener('click', () => {
            if (currentPw.value !== getAdminPassword()) { alert('Current password is wrong!'); return; }
            if (newPw.value.length < 4) { alert('Password must be at least 4 characters!'); return; }
            if (newPw.value !== confirmPw.value) { alert('New passwords do not match!'); return; }
            localStorage.setItem('fm_admin_pw', newPw.value);
            alert('✅ Password changed!');
            closeChangePwModal();
        });

        changePwModal.addEventListener('click', (e) => { if (e.target === changePwModal) closeChangePwModal(); });

        function loadDarkMode() {
            const isDark = localStorage.getItem('fm_dark') === 'true';
            document.body.classList.toggle('dark', isDark);
            darkToggle.textContent = isDark ? '☀️' : '🌙';
        }

        darkToggle.addEventListener('click', () => {
            const isDark = !document.body.classList.contains('dark');
            document.body.classList.toggle('dark', isDark);
            localStorage.setItem('fm_dark', isDark);
            darkToggle.textContent = isDark ? '☀️' : '🌙';
        });

        loadDarkMode();

        function nextId(arr) { return arr.length > 0 ? Math.max(...arr.map(x => x.id)) + 1 : 1; }

        function initApp() {
            loadSections();
        }

        function loadSections() {
            if (unsubscribeSections) unsubscribeSections();
            const q = query(collection(db, 'sections'), orderBy('order'));
            unsubscribeSections = onSnapshot(q, (snapshot) => {
                sections = [];
                snapshot.forEach((d) => sections.push({ id: parseInt(d.id), ...d.data() }));
                if (sections.length === 0) {
                    const defaultId = Date.now();
                    setDoc(doc(db, 'sections', String(defaultId)), { name: 'BSIS-1A', order: 0 });
                }
                const html = sections.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
                sectionSelect.innerHTML = html;
                sectionSelectView.innerHTML = html;
                if (sections.length > 0 && !currentSectionId) {
                    currentSectionId = sections[0].id;
                    loadStudents();
                }
            });
        }

        function loadStudents() {
            if (unsubscribeStudents) unsubscribeStudents();
            studentListContainer.innerHTML = '<div class="loading-msg">Loading students...</div>';
            const q = query(collection(db, 'students'), orderBy('name'));
            unsubscribeStudents = onSnapshot(q, (snapshot) => {
                students = [];
                snapshot.forEach((d) => students.push({ id: parseInt(d.id), ...d.data() }));
                students = students.filter(s => s.section_id === currentSectionId);
                renderStudentList();
                updateStats();
            });
        }

        function updateStats() {
            const totalStudents = students.length;
            const totalFines = students.reduce((sum, s) => sum + (s.fine || 0), 0);
            const avgFine = totalStudents > 0 ? totalFines / totalStudents : 0;
            const highestFine = totalStudents > 0 ? Math.max(...students.map(s => s.fine || 0)) : 0;
            const paid = students.filter(s => s.status === 'paid').length;
            const unpaid = totalStudents - paid;

            let totalCollected = 0;
            students.forEach(s => { totalCollected += (s.totalPaid || 0); });

            document.getElementById('statTotalStudents').textContent = totalStudents;
            document.getElementById('statTotalFines').textContent = '₱' + totalFines.toFixed(0);
            document.getElementById('statAvgFine').textContent = '₱' + avgFine.toFixed(0);
            document.getElementById('statHighestFine').textContent = '₱' + highestFine.toFixed(0);
            document.getElementById('statPaidUnpaid').textContent = paid + '/' + unpaid;
            document.getElementById('statCollected').textContent = '₱' + totalCollected.toFixed(0);
        }

        function getFilteredStudents() {
            let filtered = [...students];
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(s => (s.name || '').toLowerCase().includes(q));
            }
            if (filterGender !== 'all') filtered = filtered.filter(s => s.gender === filterGender);
            if (filterStatus !== 'all') filtered = filtered.filter(s => s.status === filterStatus);
            if (sortBy === 'fine-high') filtered.sort((a, b) => (b.fine || 0) - (a.fine || 0));
            else if (sortBy === 'fine-low') filtered.sort((a, b) => (a.fine || 0) - (b.fine || 0));
            else filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            return filtered;
        }

        function renderStudentList() {
            const filtered = getFilteredStudents();
            if (filtered.length === 0) {
                studentListContainer.innerHTML = '<div class="no-results">✨ No results ✨</div>';
                document.getElementById('totalAmount').textContent = '₱ 0.00';
                return;
            }
            let total = 0;
            let html = '';
            filtered.forEach(s => {
                total += (s.fine || 0);
                const totalPaid = s.totalPaid || 0;
                const remaining = Math.max(0, (s.fine || 0) - totalPaid);
                const genderLabel = s.gender === 'male' ? '♂ male' : s.gender === 'female' ? '♀ female' : '⚧ NB';
                const icon = s.gender === 'male' ? '👨' : s.gender === 'female' ? '👩' : '🧑';
                const statusClass = s.status === 'paid' ? 'status-paid' : 'status-unpaid';
                const statusLabel = s.status === 'paid' ? '✓ Paid' : '✗ Unpaid';
                const paymentInfo = totalPaid > 0 ? `<div style="font-size:0.65rem;color:#888;margin-top:2px;">Paid: ₱${totalPaid.toFixed(2)} | Remaining: ₱${remaining.toFixed(2)}</div>` : '';
                const adminButtons = isAdmin ? `
                    <button class="icon-btn" onclick="window.openPaymentModal(${s.id})">💳 Pay</button>
                    <button class="icon-btn" onclick="window.editStudent(${s.id})">✏️ Edit</button>
                    <button class="icon-btn" onclick="window.deleteStudent(${s.id})">🗑️</button>
                ` : `<button class="icon-btn" onclick="window.openPaymentModal(${s.id})">💳 History</button>`;
                html += `
                    <div class="student-entry">
                        <div>
                            <span class="student-name">${icon} ${escapeHtml(s.name)}</span>
                            <span class="gender-badge">${genderLabel}</span>
                            <span class="${statusClass}">${statusLabel}</span>
                            <span class="fine-amount">₱ ${(s.fine || 0).toFixed(2)}</span>
                            ${paymentInfo}
                        </div>
                        <div class="entry-actions">${adminButtons}</div>
                    </div>
                `;
            });
            studentListContainer.innerHTML = html;
            document.getElementById('totalAmount').textContent = '₱ ' + total.toFixed(2);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m] || m));
        }

        async function addOrUpdateStudent() {
            if (!isAdmin) return;
            const name = nameInput.value.trim();
            if (!name) { alert('Please enter student name'); return; }
            const data = {
                name: name,
                gender: genderSelect.value,
                fine: parseFloat(fineInput.value) || 0,
                status: statusSelect.value,
                section_id: currentSectionId,
            };
            if (editModeId) {
                await updateDoc(doc(db, 'students', String(editModeId)), data);
                editModeId = null;
                addBtn.textContent = '➕ ADD';
            } else {
                const newId = nextId(students);
                data.id = newId;
                data.totalPaid = 0;
                data.order = newId;
                await setDoc(doc(db, 'students', String(newId)), data);
            }
            clearForm();
        }

        async function editStudent(id) {
            if (!isAdmin) return;
            const student = students.find(s => s.id === id);
            if (student) {
                nameInput.value = student.name;
                genderSelect.value = student.gender;
                fineInput.value = student.fine;
                statusSelect.value = student.status;
                editModeId = id;
                addBtn.textContent = '✏️ UPDATE';
            }
        }

        async function deleteStudent(id) {
            if (!isAdmin) return;
            if (confirm('Delete this student?')) {
                await deleteDoc(doc(db, 'students', String(id)));
                const payments = await getDocs(collection(db, 'students', String(id), 'payments'));
                const batch = [];
                payments.forEach((d) => batch.push(deleteDoc(doc(db, 'students', String(id), 'payments', d.id))));
                await Promise.all(batch);
            }
        }

        function clearForm() {
            nameInput.value = ''; genderSelect.value = 'male';
            fineInput.value = '0'; statusSelect.value = 'unpaid';
            editModeId = null; addBtn.textContent = '➕ ADD';
        }

        async function addNewSection() {
            if (!isAdmin) return;
            const name = prompt('Enter section name (e.g., BSIS-1B):');
            if (name) {
                const newId = nextId(sections);
                await setDoc(doc(db, 'sections', String(newId)), { name, order: newId });
            }
        }

        async function openPaymentModal(studentId) {
            currentPaymentStudentId = studentId;
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            const totalPaid = student.totalPaid || 0;
            const remaining = Math.max(0, (student.fine || 0) - totalPaid);
            paymentModalTitle.textContent = `💳 ${student.name} — Remaining: ₱${remaining.toFixed(2)}`;
            paymentAmount.value = remaining > 0 ? remaining.toFixed(2) : '0';
            paymentDate.value = new Date().toISOString().split('T')[0];
            paymentNote.value = '';
            renderPaymentHistory(studentId);
            paymentModal.classList.add('active');
        }

        window.closePaymentModal = function() {
            paymentModal.classList.remove('active');
            currentPaymentStudentId = null;
        };

        async function renderPaymentHistory(studentId) {
            const snapshot = await getDocs(query(collection(db, 'students', String(studentId), 'payments'), orderBy('date', 'desc')));
            const payments = [];
            snapshot.forEach((d) => payments.push({ id: d.id, ...d.data() }));
            if (payments.length === 0) {
                paymentHistoryList.innerHTML = '<div class="no-results">No payments yet</div>';
                return;
            }
            let html = '';
            payments.forEach((p) => {
                const typeClass = p.type === 'full' ? '' : 'partial';
                const typeLabel = p.type === 'full' ? 'Full' : 'Partial';
                const deleteBtn = isAdmin ? `<button class="btn-delete-payment" onclick="window.deletePayment(${studentId}, '${p.id}')">✕</button>` : '';
                html += `
                    <div class="payment-history-entry">
                        <div>
                            <span class="payment-amount">₱${(p.amount || 0).toFixed(2)}</span>
                            <span class="payment-type ${typeClass}">${typeLabel}</span>
                            ${p.note ? `<div style="font-size:0.7rem;color:#888;">${escapeHtml(p.note)}</div>` : ''}
                            <div class="payment-date">${p.date || ''}</div>
                        </div>
                        ${deleteBtn}
                    </div>
                `;
            });
            paymentHistoryList.innerHTML = html;
        }

        async function addPayment() {
            if (!isAdmin) return;
            if (!currentPaymentStudentId) return;
            const student = students.find(s => s.id === currentPaymentStudentId);
            if (!student) return;
            const amount = parseFloat(paymentAmount.value) || 0;
            if (amount <= 0) { alert('Enter a valid amount'); return; }
            const totalPaid = student.totalPaid || 0;
            const remaining = (student.fine || 0) - totalPaid;
            if (amount > remaining + 0.01) { alert('Amount exceeds remaining balance (₱' + remaining.toFixed(2) + ')'); return; }
            const paymentType = Math.abs(amount - remaining) < 0.01 ? 'full' : 'partial';
            const paymentData = {
                amount,
                date: paymentDate.value || new Date().toISOString().split('T')[0],
                note: paymentNote.value.trim(),
                type: paymentType
            };
            const paymentRef = doc(collection(db, 'students', String(currentPaymentStudentId), 'payments'));
            await setDoc(paymentRef, paymentData);
            const newTotalPaid = totalPaid + amount;
            const updateData = { totalPaid: newTotalPaid };
            if (paymentType === 'full') updateData.status = 'paid';
            await updateDoc(doc(db, 'students', String(currentPaymentStudentId)), updateData);
            openPaymentModal(currentPaymentStudentId);
        }

        async function deletePayment(studentId, paymentId) {
            if (!isAdmin) return;
            if (!confirm('Delete this payment?')) return;
            const paymentSnap = await getDoc(doc(db, 'students', String(studentId), 'payments', paymentId));
            if (!paymentSnap.exists()) return;
            const paymentData = paymentSnap.data();
            const wasFull = paymentData.type === 'full';
            const amount = paymentData.amount || 0;
            await deleteDoc(doc(db, 'students', String(studentId), 'payments', paymentId));
            const student = students.find(s => s.id === studentId);
            if (student) {
                const newTotal = Math.max(0, (student.totalPaid || 0) - amount);
                const updateData = { totalPaid: newTotal };
                if (wasFull && newTotal < (student.fine || 0)) updateData.status = 'unpaid';
                await updateDoc(doc(db, 'students', String(studentId)), updateData);
            }
            openPaymentModal(studentId);
        }

        submitPaymentBtn.addEventListener('click', addPayment);
        paymentModal.addEventListener('click', (e) => { if (e.target === paymentModal) closePaymentModal(); });

        function exportCSV() {
            const section = sections.find(s => s.id === currentSectionId);
            const sectionName = section ? section.name : 'section';
            let csv = 'Name,Gender,Fine,Status\n';
            students.forEach(s => { csv += `"${s.name}",${s.gender},${(s.fine||0).toFixed(2)},${s.status}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = sectionName + '_fines.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function exportPaymentsCSV() {
            const section = sections.find(s => s.id === currentSectionId);
            const sectionName = section ? section.name : 'section';
            let csv = 'Student Name,Amount,Date,Type,Note\n';
            students.forEach(async (s) => {
                const snap = await getDocs(collection(db, 'students', String(s.id), 'payments'));
                snap.forEach((d) => {
                    const p = d.data();
                    csv += `"${s.name}",${(p.amount||0).toFixed(2)},${p.date},${p.type},"${p.note||''}"\n`;
                });
            });
            setTimeout(() => {
                const blob = new Blob([csv], { type: 'text/csv' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = sectionName + '_payments.csv';
                a.click();
                URL.revokeObjectURL(a.href);
            }, 1000);
        }

        exportCsvBtn.addEventListener('click', exportCSV);
        exportPaymentsBtn.addEventListener('click', exportPaymentsCSV);

        sectionSelect.addEventListener('change', () => {
            currentSectionId = parseInt(sectionSelect.value);
            sectionSelectView.value = currentSectionId;
            loadStudents();
        });
        sectionSelectView.addEventListener('change', () => {
            currentSectionId = parseInt(sectionSelectView.value);
            sectionSelect.value = currentSectionId;
            loadStudents();
        });
        addSectionBtn.addEventListener('click', addNewSection);
        addBtn.addEventListener('click', addOrUpdateStudent);
        clearFormBtn.addEventListener('click', clearForm);

        searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderStudentList(); });
        filterGenderSelect.addEventListener('change', () => { filterGender = filterGenderSelect.value; renderStudentList(); });
        filterStatusSelect.addEventListener('change', () => { filterStatus = filterStatusSelect.value; renderStudentList(); });
        sortBySelect.addEventListener('change', () => { sortBy = sortBySelect.value; renderStudentList(); });
        nameInput.addEventListener('keypress', e => { if (e.key === 'Enter') addOrUpdateStudent(); });

        window.editStudent = editStudent;
        window.deleteStudent = deleteStudent;
        window.openPaymentModal = openPaymentModal;
        window.deletePayment = deletePayment;
    </script>
</body>
</html>
